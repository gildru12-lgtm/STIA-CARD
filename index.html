<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STIA | Official Badge Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --gold: #B8945E; --bg: #0A0A0A; --border: rgba(184, 148, 94, 0.4); }
        body { background-color: #050505; color: #E0E0E0; font-family: 'Inter', sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        .generator-container { background: #111; border: 1px solid var(--border); border-radius: 12px; padding: 15px; width: 100%; max-width: 360px; box-shadow: 0 10px 30px rgba(0,0,0,0.7); margin-bottom: 20px; box-sizing: border-box; }
        .generator-container h2 { margin: 0 0 15px 0; color: #FFF; font-family: 'Oswald', sans-serif; font-size: 1.3rem; text-align: center; }
        .input-group { margin-bottom: 10px; text-align: right; }
        .input-group label { display: block; font-size: 0.8rem; color: var(--gold); margin-bottom: 3px; font-weight: bold; }
        .input-group input, .input-group select { width: 100%; padding: 10px; background: #1A1A1A; border: 1px solid #333; border-radius: 6px; color: #FFF; font-size: 0.95rem; box-sizing: border-box; }
        
        .file-input-wrapper { position: relative; margin-bottom: 10px; }
        .btn-file { width: 100%; padding: 10px; background: #222; color: var(--gold); border: 1px solid #444; border-radius: 6px; font-size: 0.9rem; font-weight: bold; cursor: pointer; text-align: center; display: block; box-sizing: border-box; }
        #input-photo { position: absolute; left: 0; top: 0; opacity: 0; width: 100%; height: 100%; cursor: pointer; }

        .btn-generate { width: 100%; padding: 14px; background: var(--gold); color: #000; border: none; border-radius: 6px; font-size: 1rem; font-weight: bold; cursor: pointer; text-transform: uppercase; font-family: 'Oswald', sans-serif; margin-top: 10px; display: flex; justify-content: center; align-items: center; gap: 8px; }

        #output-image-container { margin-top: 25px; text-align: center; display: none; width: 100%; max-width: 340px; }
        #final-card-image { max-width: 100%; border: 2px solid var(--gold); border-radius: 14px; box-shadow: 0 15px 35px rgba(0,0,0,0.9); }

        /* מבנה הכרטיס החדש */
        #member-card-wrap { padding: 5px; }
        .member-card { width: 340px; height: 500px; background: linear-gradient(135deg, #141414 0%, #050505 100%); border: 1px solid var(--border); border-radius: 14px; padding: 20px; position: relative; box-shadow: 0 20px 40px rgba(0,0,0,0.8); display: flex; flex-direction: column; overflow: hidden; box-sizing: border-box; text-align: left; direction: ltr; }
        
        /* לוגו שולט במרכז למעלה */
        .card-header-centered { display: flex; justify-content: center; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 15px; margin-bottom: 15px; width: 100%; }
        .logo-box-large { width: 110px; height: 110px; display: flex; justify-content: center; align-items: center; }
        .logo-box-large img { width: 100%; height: auto; max-height: 110px; object-fit: contain; }
        
        /* פריסה דו-עמודית לחלק האמצעי */
        .card-middle-section { display: flex; justify-content: space-between; gap: 15px; flex-grow: 1; }
        .card-grid-left { display: flex; flex-direction: column; gap: 10px; flex-grow: 1; width: calc(100% - 105px); }
        
        /* בלוק תמונת פספורט בצד ימין */
        .card-photo-right { width: 90px; height: 115px; border: 2px solid var(--gold); background: #000; border-radius: 6px; overflow: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; flex-shrink: 0; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .card-photo-right img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .photo-placeholder { font-size: 0.55rem; color: #444; text-transform: uppercase; text-align: center; font-weight: bold; line-height: 1.2; }

        .info-block { background: rgba(255,255,255,0.02); padding: 8px 10px; border-radius: 6px; border-left: 2px solid var(--gold); }
        .label { font-size: 0.55rem; text-transform: uppercase; color: #888; letter-spacing: 1px; margin-bottom: 2px; }
        .value { font-size: 0.9rem; font-weight: 700; color: #FFF; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .value-id { font-family: monospace; color: var(--gold); font-size: 0.95rem; }
        
        .clock-block { background: rgba(184, 148, 94, 0.07); border-left-color: #FFF; margin-top: auto; }
        .live-time { font-family: monospace; font-size: 0.85rem; color: #FFF; font-weight: 700; }
        
        .status-row { display: flex; justify-content: space-between; align-items: center; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.05); margin-top: 10px; }
        .tier-text { font-family: 'Oswald', sans-serif; font-size: 1.1rem; text-transform: uppercase; color: var(--gold); }
        .status-badge { display: flex; align-items: center; gap: 5px; background: rgba(37, 211, 102, 0.1); padding: 5px 12px; border-radius: 20px; color: #25D366; font-size: 0.7rem; font-weight: 900; text-transform: uppercase; }
        .pulse-dot { width: 7px; height: 7px; background: #25D366; border-radius: 50%; box-shadow: 0 0 6px #25D366; }
    </style>
</head>
<body>

    <div class="generator-container">
        <h2>STIA Secure Panel</h2>
        
        <div class="input-group">
            <label>תמונת פספורט של המדריך</label>
            <div class="file-input-wrapper">
                <div class="btn-file" id="file-label">בחר תמונה מהגלריה</div>
                <input type="file" id="input-photo" accept="image/*" onchange="previewPhoto(this)">
            </div>
        </div>

        <div class="input-group">
            <label>Member Name (באנגלית)</label>
            <input type="text" id="input-name" value="GIL DRUCKER" oninput="updateCard()">
        </div>
        <div class="input-group">
            <label>Credential ID</label>
            <input type="text" id="input-id" value="STIA-2026-8954" oninput="updateCard()">
        </div>
        <div class="input-group">
            <label>Specialty Module</label>
            <input type="text" id="input-spec" value="CQB & Firearms Instructor" oninput="updateCard()">
        </div>
        <div class="input-group">
            <label>Tier Level</label>
            <select id="input-tier" onchange="updateCard()">
                <option value="Silver Associate">Silver Associate</option>
                <option value="Gold Professional">Gold Professional</option>
                <option value="Senior Instructor">Senior Instructor</option>
                <option value="Master Instructor">Master Instructor</option>
            </select>
        </div>
        <button class="btn-generate" onclick="generateImageCard()">הפק כרטיס מאובטח סופי</button>
    </div>

    <div id="member-card-wrap">
        <div class="member-card" id="member-card">
            
            <div class="card-header-centered">
                <div class="logo-box-large">
                    <img src="logo.png" alt="STIA">
                </div>
            </div>
            
            <div class="card-middle-section">
                
                <div class="card-grid-left">
                    <div class="info-block"><div class="label">Member Name</div><div class="value" id="card-name">GIL DRUCKER</div></div>
                    <div class="info-block"><div class="label">Credential ID</div><div class="value value-id" id="card-id">STIA-2026-8954</div></div>
                    <div class="info-block"><div class="label">Specialty Module</div><div class="value" id="card-spec" style="font-size: 0.8rem; color: #B8945E;">CQB & Firearms Instructor</div></div>
                </div>
                
                <div class="card-photo-right">
                    <img id="card-photo" src="" alt="Instructor Photo">
                    <div class="photo-placeholder" id="photo-placeholder">PHOTO<br>ID<br>REQUIRED</div>
                </div>
                
            </div>

            <div class="info-block clock-block">
                <div class="label" style="color: var(--gold); font-weight: 700;">Verification Timestamp</div>
                <div class="live-time" id="live-clock">Securing...</div>
            </div>
            
            <div class="status-row">
                <div class="tier-text" id="card-tier">Silver Associate</div>
                <div class="status-badge"><div class="pulse-dot"></div>Active</div>
            </div>
        </div>
    </div>

    <div id="output-image-container">
        <img id="final-card-image" src="" alt="STIA Secure Card">
    </div>

    <script>
        function previewPhoto(input) {
            const fileLabel = document.getElementById('file-label');
            const cardPhoto = document.getElementById('card-photo');
            const placeholder = document.getElementById('photo-placeholder');

            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    cardPhoto.src = e.target.result;
                    cardPhoto.style.display = 'block';
                    placeholder.style.display = 'none';
                    fileLabel.innerText = "תמונה נטענה בהצלחה";
                    fileLabel.style.color = "#25D366";
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        function updateCard() {
            document.getElementById('card-name').innerText = document.getElementById('input-name').value.toUpperCase();
            document.getElementById('card-id').innerText = document.getElementById('input-id').value.toUpperCase();
            document.getElementById('card-spec').innerText = document.getElementById('input-spec').value;
            document.getElementById('card-tier').innerText = document.getElementById('input-tier').value;
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('live-clock').innerText = now.toLocaleString('en-US', { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false }) + " GMT";
        }
        updateClock(); setInterval(updateClock, 1000);

        function generateImageCard() {
            const cardPhoto = document.getElementById('card-photo');
            if (!cardPhoto.src || cardPhoto.src === window.location.href) {
                alert("חובה להעלות תמונת מדריך לפני הפקת הכרטיס.");
                return;
            }

            document.getElementById('output-image-container').style.display = 'none';
            const card = document.getElementById('member-card');
            
            html2canvas(card, {
                scale: 3,
                logging: false,
                useCORS: true,
                allowTaint: true,
                backgroundColor: "#050505"
            }).then(canvas => {
                const imgData = canvas.toDataURL('image/png');
                const finalImg = document.getElementById('final-card-image');
                finalImg.src = imgData;
                document.getElementById('output-image-container').style.display = 'block';
                finalImg.scrollIntoView({ behavior: 'smooth' });
            });
        }
    </script>
</body>
</html>
